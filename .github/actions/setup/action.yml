name: Setup cion-overtime + cion-suite
description: Checkout cion-suite sibling, setup pnpm/node, install+build cion-suite, install cion-overtime.

inputs:
  cion-suite-token:
    description: PAT with read access to cion-suite/cion-suite.
    required: true
  frozen-lockfile:
    description: Pass --frozen-lockfile to cion-overtime install ('true' | 'false').
    required: false
    default: 'false'

runs:
  using: composite
  steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      with:
        repository: cion-suite/cion-suite
        token: ${{ inputs.cion-suite-token }}
        path: cion-suite

    - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6
      with:
        version: 11.1.2

    - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
      with:
        node-version: 24.15.0
        cache: pnpm
        cache-dependency-path: |
          cion-overtime/pnpm-lock.yaml
          cion-suite/pnpm-lock.yaml

    - name: Install + build cion-suite
      working-directory: cion-suite
      shell: bash
      run: |
        pnpm install --frozen-lockfile
        pnpm -r build

    - name: Install cion-overtime
      working-directory: cion-overtime
      shell: bash
      run: |
        if [ "${{ inputs.frozen-lockfile }}" = "true" ]; then
          pnpm install --frozen-lockfile
        else
          pnpm install --no-frozen-lockfile
        fi
