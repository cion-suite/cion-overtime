<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- REPLACE BEFORE SHIP: match productName in electron-builder.json -->
    <title>Overtime</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #09090b;
            color: #fafafa;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            user-select: none;
            -webkit-app-region: drag;
        }

        .content {
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: fadeUp 0.7s ease-out both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .logo-container {
            position: relative;
            margin-bottom: 24px;
        }

        .logo {
            width: 64px;
            height: 64px;
            border-radius: 16px;
            animation: pulse 2s ease-in-out infinite;
        }

        .logo-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80px;
            height: 80px;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.25) 0%, transparent 70%);
            border-radius: 50%;
            animation: glow 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50%      { transform: scale(1.03); }
        }

        @keyframes glow {
            0%, 100% { opacity: 0.5; transform: translate(-50%, -50%) scale(1); }
            50%      { opacity: 1;   transform: translate(-50%, -50%) scale(1.15); }
        }

        .app-name {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 4px;
            letter-spacing: -0.3px;
        }

        .app-version {
            font-size: 11px;
            color: #71717a;
            margin-bottom: 32px;
        }

        .progress-container {
            width: 200px;
            margin-bottom: 12px;
        }

        .progress-bar {
            height: 3px;
            background: #27272a;
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #3b82f6, #60a5fa);
            border-radius: 2px;
            width: 0%;
            transition: width 0.3s ease-out;
        }

        .status-text {
            font-size: 12px;
            color: #a1a1aa;
            text-align: center;
            min-height: 18px;
        }

        .dots::after {
            content: '';
            animation: dots 1.5s steps(4, end) infinite;
        }

        @keyframes dots {
            0%, 20%  { content: ''; }
            40%      { content: '.'; }
            60%      { content: '..'; }
            80%, 100%{ content: '...'; }
        }

        canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
        }
    </style>
</head>
<body>
    <canvas id="web"></canvas>

    <div class="content">
        <div class="logo-container">
            <div class="logo-glow"></div>
            <!-- REPLACE BEFORE SHIP: alt = productName -->
            <img class="logo" id="logo" src="" alt="App">
        </div>

        <!-- REPLACE BEFORE SHIP: productName -->
        <div class="app-name" id="app-name">Cion Template</div>
        <div class="app-version" id="version">v0.0.0</div>

        <div class="progress-container">
            <div class="progress-bar">
                <div class="progress-fill" id="progress"></div>
            </div>
        </div>

        <div class="status-text">
            <span id="status">Starting</span><span class="dots"></span>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('web');
        const ctx = canvas.getContext('2d');

        const NODE_COUNT = 55;
        const CONNECT_DIST = 130;
        const MOUSE_DIST = 160;
        const MOUSE_PUSH = 90;
        const SPEED = 0.4;
        const NODE_COLOR = 'rgba(59,130,246,';
        const LINE_COLOR = 'rgba(59,130,246,';

        let W, H, nodes, mouse = { x: -9999, y: -9999 }, webAlpha = 0;

        function resize() {
            W = canvas.width  = window.innerWidth;
            H = canvas.height = window.innerHeight;
        }

        function makeNode() {
            const angle = Math.random() * Math.PI * 2;
            const spd   = SPEED * (0.4 + Math.random() * 0.6);
            return {
                x:  Math.random() * W,
                y:  Math.random() * H,
                vx: Math.cos(angle) * spd,
                vy: Math.sin(angle) * spd,
                r:  1.5 + Math.random() * 1.5,
            };
        }

        function init() {
            resize();
            nodes = Array.from({ length: NODE_COUNT }, makeNode);
        }

        function tick() {
            ctx.clearRect(0, 0, W, H);
            webAlpha = Math.min(0.45, webAlpha + 0.008);
            ctx.globalAlpha = webAlpha;

            for (const n of nodes) {
                const dx = n.x - mouse.x, dy = n.y - mouse.y;
                const d2 = dx * dx + dy * dy;
                if (d2 < MOUSE_DIST * MOUSE_DIST && d2 > 0) {
                    const d = Math.sqrt(d2);
                    const force = (MOUSE_DIST - d) / MOUSE_DIST * 0.012;
                    n.vx += (dx / d) * force * MOUSE_PUSH;
                    n.vy += (dy / d) * force * MOUSE_PUSH;
                }

                const spd = Math.sqrt(n.vx * n.vx + n.vy * n.vy);
                const maxSpd = SPEED * 2.5;
                if (spd > maxSpd) { n.vx = n.vx / spd * maxSpd; n.vy = n.vy / spd * maxSpd; }
                if (spd < SPEED * 0.3) { const s = SPEED * 0.3 / (spd || 1); n.vx *= s; n.vy *= s; }

                n.x += n.vx;
                n.y += n.vy;

                if (n.x < 0) { n.x = 0; n.vx = Math.abs(n.vx); }
                if (n.x > W) { n.x = W; n.vx = -Math.abs(n.vx); }
                if (n.y < 0) { n.y = 0; n.vy = Math.abs(n.vy); }
                if (n.y > H) { n.y = H; n.vy = -Math.abs(n.vy); }
            }

            for (let i = 0; i < nodes.length; i++) {
                for (let j = i + 1; j < nodes.length; j++) {
                    const a = nodes[i], b = nodes[j];
                    const dx = a.x - b.x, dy = a.y - b.y;
                    const d = Math.sqrt(dx * dx + dy * dy);
                    if (d < CONNECT_DIST) {
                        const alpha = (1 - d / CONNECT_DIST) * 0.2;
                        ctx.beginPath();
                        ctx.strokeStyle = LINE_COLOR + alpha + ')';
                        ctx.lineWidth = 0.7;
                        ctx.moveTo(a.x, a.y);
                        ctx.lineTo(b.x, b.y);
                        ctx.stroke();
                    }
                }
            }

            for (const n of nodes) {
                ctx.beginPath();
                ctx.arc(n.x, n.y, n.r, 0, Math.PI * 2);
                ctx.fillStyle = NODE_COLOR + '0.35)';
                ctx.fill();
            }

            ctx.globalAlpha = 1;
            requestAnimationFrame(tick);
        }

        window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
        window.addEventListener('mouseleave', () => { mouse.x = -9999; mouse.y = -9999; });
        window.addEventListener('resize', resize);

        init();
        tick();

        window.splashAPI = {
            setProgress: (percent) => {
                document.getElementById('progress').style.width = percent + '%';
            },
            setStatus: (text) => {
                document.getElementById('status').textContent = text;
            },
            setVersion: (version) => {
                document.getElementById('version').textContent = 'v' + version;
            },
            setLogo: (path) => {
                document.getElementById('logo').src = path;
            },
            setName: (name) => {
                document.getElementById('app-name').textContent = name;
            },
        };
    </script>
</body>
</html>
